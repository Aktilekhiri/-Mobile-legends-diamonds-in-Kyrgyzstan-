<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MLBBDiamond.kg — Пополнение алмазов Mobile Legends в Кыргызстане</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #0B1D3A;
  --navy-light: #112548;
  --blue:       #2E7DED;
  --blue-light: #4d93f5;
  --blue-dark:  #1a5fb8;
  --gold:       #FFBA08;
  --gold-dark:  #d49a00;
  --gold-light: #ffd24d;
  --green:      #25D366;
  --green-dark: #1da851;
  --white:      #f0f4ff;
  --muted:      #8ba3cc;
  --card:       rgba(17,37,72,0.9);
  --border:     rgba(46,125,237,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden}

.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(46,125,237,.14) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%,rgba(255,186,8,.08) 0%,transparent 55%),
    radial-gradient(ellipse 50% 70% at 50% 50%,rgba(11,29,58,.97) 0%,transparent 100%)}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:linear-gradient(var(--blue) 1px,transparent 1px),linear-gradient(90deg,var(--blue) 1px,transparent 1px);
  background-size:40px 40px}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 5%;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(11,29,58,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:9px;font-family:'Rajdhani',sans-serif;
  font-size:1.3rem;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:.03em}
.nav-logo .di{color:var(--gold);font-size:1.4rem}
.nav-logo .hl{color:var(--gold)}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.88rem;font-weight:600;
  padding:6px 13px;border-radius:8px;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:var(--white);background:rgba(46,125,237,.15)}
.user-menu{display:flex;align-items:center;gap:8px;margin-left:8px}
.user-name{color:var(--gold);font-weight:700;font-size:.85rem;background:rgba(255,186,8,.1);padding:4px 10px;border-radius:40px;cursor:pointer}
.user-name:hover{background:rgba(255,186,8,.2)}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang-toggle button{background:none;border:none;color:var(--muted);font-size:.76rem;font-weight:700;
  cursor:pointer;padding:5px 11px;transition:all .2s;font-family:'Nunito',sans-serif}
.lang-toggle button.active{background:var(--blue);color:#fff}
.nav-cta{background:var(--gold)!important;color:var(--navy)!important;font-weight:800!important;
  padding:7px 16px!important;border-radius:9px!important;font-size:.84rem!important;
  box-shadow:0 0 16px rgba(255,186,8,.3)!important}
.nav-cta:hover{background:var(--gold-light)!important;transform:translateY(-1px)!important}
.online-dot{display:inline-flex;align-items:center;gap:5px;background:rgba(37,211,102,.1);
  border:1px solid rgba(37,211,102,.28);border-radius:100px;padding:4px 11px;
  font-size:.73rem;font-weight:700;color:#25d366;margin-left:2px}
.online-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:#25d366;
  animation:blink 1.7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.hamburger span{width:22px;height:2px;background:var(--white);border-radius:2px;display:block}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;z-index:99;
  background:rgba(11,29,58,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:16px 5% 20px;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--white);text-decoration:none;font-weight:600;padding:12px 0;
  border-bottom:1px solid var(--border);font-size:1rem;display:flex;align-items:center;gap:8px}

.page{display:none;position:relative;z-index:1;padding-top:68px;min-height:100vh}
.page.active{display:block}

.urgency-bar{background:linear-gradient(90deg,rgba(46,125,237,.14),rgba(255,186,8,.1),rgba(46,125,237,.14));
  border-bottom:1px solid rgba(255,186,8,.18);padding:10px 5%;
  display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;
  font-size:.79rem;font-weight:700;position:relative;z-index:1}
.urgency-bar span{display:inline-flex;align-items:center;gap:5px;color:var(--gold)}
.urgency-bar .w{color:rgba(240,244,255,.75)}

.hero{min-height:calc(100vh - 108px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:56px 5% 40px}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,186,8,.11);
  border:1px solid rgba(255,186,8,.3);color:var(--gold);font-size:.76rem;font-weight:800;
  padding:6px 16px;border-radius:100px;margin-bottom:22px;letter-spacing:.07em;text-transform:uppercase}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2rem,5.5vw,3.8rem);font-weight:700;
  line-height:1.14;letter-spacing:.02em;max-width:800px;margin-bottom:16px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero h1 .bl{color:var(--blue-light)}
.hero-sub{font-size:clamp(.95rem,2vw,1.2rem);color:var(--muted);margin-bottom:30px;
  font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.hero-sub span{color:var(--gold)}
.hero-cta-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.hero-timer{margin-bottom:44px;font-size:.82rem;color:var(--muted);font-weight:600}
.hero-timer strong{color:#34d399}
.hero-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:13px 20px;text-align:center;min-width:110px;backdrop-filter:blur(10px)}
.stat-pill .val{font-family:'Rajdhani',sans-serif;font-size:1.7rem;font-weight:700;color:var(--gold);line-height:1}
.stat-pill .lbl{font-size:.72rem;color:var(--muted);margin-top:4px;font-weight:600}

.btn-primary{background:var(--gold);color:var(--navy);font-family:'Rajdhani',sans-serif;
  font-size:1.1rem;font-weight:700;padding:15px 38px;border-radius:13px;border:none;cursor:pointer;
  letter-spacing:.07em;text-transform:uppercase;transition:all .22s;
  box-shadow:0 0 24px rgba(255,186,8,.3),0 4px 18px rgba(255,186,8,.25);
  display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);
  box-shadow:0 0 36px rgba(255,186,8,.55),0 8px 28px rgba(255,186,8,.3)}
.btn-wa{background:var(--green);color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.05rem;
  font-weight:700;padding:15px 32px;border-radius:13px;border:none;cursor:pointer;
  letter-spacing:.06em;text-transform:uppercase;transition:all .22s;
  box-shadow:0 0 22px rgba(37,211,102,.28);display:inline-flex;align-items:center;gap:8px;
  text-decoration:none}
.btn-wa:hover{background:var(--green-dark);transform:translateY(-2px);box-shadow:0 0 34px rgba(37,211,102,.45)}
.btn-secondary{background:transparent;color:var(--white);font-family:'Rajdhani',sans-serif;
  font-size:1.05rem;font-weight:700;padding:15px 32px;border-radius:13px;
  border:1.5px solid rgba(46,125,237,.5);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;
  transition:all .22s;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{border-color:var(--blue);background:rgba(46,125,237,.12)}
.btn-tg{background:#0088cc;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  padding:13px 26px;border-radius:12px;border:none;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;
  transition:all .22s;display:inline-flex;align-items:center;gap:7px;
  box-shadow:0 4px 16px rgba(0,136,204,.25);text-decoration:none}
.btn-tg:hover{background:#0099db;transform:translateY(-2px)}
.btn-full{width:100%;justify-content:center}

section{padding:64px 5%;position:relative}
.sec-label{font-size:.7rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--blue-light);margin-bottom:8px}
.sec-divider{width:44px;height:3px;background:var(--gold);border-radius:2px;margin-bottom:14px}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:clamp(1.5rem,3.5vw,2.45rem);font-weight:700;margin-bottom:10px;line-height:1.2}
.sec-title em{color:var(--gold);font-style:normal}
.sec-sub{color:var(--muted);font-size:.93rem;max-width:500px;line-height:1.65;margin-bottom:40px}

.trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
.trust-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:24px 20px;backdrop-filter:blur(10px);transition:all .25s}
.trust-card:hover{transform:translateY(-3px);border-color:rgba(255,186,8,.28);
  box-shadow:0 8px 32px rgba(255,186,8,.09)}
.trust-icon{font-size:1.9rem;line-height:1}
.trust-card h3{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700}
.trust-card p{color:var(--muted);font-size:.86rem;line-height:1.6}
.trust-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(52,211,153,.11);
  border:1px solid rgba(52,211,153,.24);color:#34d399;font-size:.7rem;font-weight:800;
  padding:3px 10px;border-radius:100px;width:fit-content}

.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.feature-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:24px 20px;transition:all .25s;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;transition:opacity .3s}
.feature-card:hover{border-color:rgba(46,125,237,.38);transform:translateY(-3px);
  box-shadow:0 10px 32px rgba(0,0,0,.25)}
.feature-card:hover::before{opacity:1}
.ficon{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:1.45rem;margin-bottom:13px}
.ficon.g{background:rgba(255,186,8,.12)}
.ficon.b{background:rgba(46,125,237,.14)}
.ficon.gr{background:rgba(52,211,153,.12)}
.feature-card h3{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:7px}
.feature-card p{color:var(--muted);font-size:.86rem;line-height:1.6}

.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px}
.step-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:24px 16px;text-align:center;transition:all .25s;backdrop-filter:blur(10px)}
.step-card:hover{border-color:rgba(255,186,8,.3);transform:translateY(-3px)}
.step-num{width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin:0 auto 13px;
  box-shadow:0 4px 14px rgba(46,125,237,.38)}
.step-card h3{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;margin-bottom:6px}
.step-card p{color:var(--muted);font-size:.84rem;line-height:1.6}

.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.contact-card{border-radius:20px;padding:30px 24px;text-align:center;backdrop-filter:blur(12px)}
.contact-card.wa{background:linear-gradient(135deg,rgba(37,211,102,.13),rgba(11,29,58,.85));
  border:1px solid rgba(37,211,102,.26)}
.contact-card.tg{background:linear-gradient(135deg,rgba(0,136,204,.13),rgba(11,29,58,.85));
  border:1px solid rgba(0,136,204,.24)}
.contact-icon{font-size:2.8rem;margin-bottom:12px}
.contact-card h3{font-family:'Rajdhani',sans-serif;font-size:1.35rem;font-weight:700;margin-bottom:8px}
.contact-card p{color:var(--muted);font-size:.88rem;margin-bottom:18px;line-height:1.6}
.resp-time{display:inline-flex;align-items:center;gap:5px;background:rgba(255,186,8,.1);
  border:1px solid rgba(255,186,8,.24);color:var(--gold);font-size:.73rem;font-weight:800;
  padding:4px 13px;border-radius:100px;margin-bottom:16px}

.topup-layout{display:grid;grid-template-columns:1fr 1.8fr;gap:26px;
  max-width:1060px;margin:32px auto 0;padding:0 5% 52px}
.form-card,.packages-card{background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:26px;backdrop-filter:blur(14px)}
.card-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;
  margin-bottom:20px;display:flex;align-items:center;gap:8px}
.card-title .ico{color:var(--gold)}
label{display:block;font-size:.79rem;font-weight:800;color:var(--muted);
  margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.input-field{width:100%;background:rgba(11,29,58,.75);border:1.5px solid var(--border);
  border-radius:10px;color:var(--white);font-family:'Nunito',sans-serif;font-size:1rem;
  padding:13px 16px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:14px}
.input-field:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,125,237,.11)}
.input-field::placeholder{color:rgba(139,163,204,.4)}
.input-hint{font-size:.76rem;color:var(--muted);margin-top:-9px;margin-bottom:14px;line-height:1.5}
.id-guide{background:rgba(255,186,8,.06);border:1px solid rgba(255,186,8,.19);
  border-radius:12px;padding:13px 15px;margin-top:4px}
.id-guide .gt{font-size:.77rem;color:var(--gold);font-weight:800;margin-bottom:5px}
.id-guide .gb{font-size:.8rem;color:var(--muted);line-height:1.7}
.id-guide .gb strong{color:var(--white)}
.packages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pkg-card{background:rgba(11,29,58,.75);border:2px solid var(--border);border-radius:13px;
  padding:14px 9px;text-align:center;cursor:pointer;transition:all .22s;position:relative}
.pkg-card:hover{border-color:rgba(46,125,237,.5);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(46,125,237,.14)}
.pkg-card.selected{border-color:var(--gold);background:rgba(255,186,8,.07);
  box-shadow:0 0 18px rgba(255,186,8,.16)}
.pkg-card.popular::before{content:'ХИТ';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:var(--navy);font-size:.61rem;font-weight:900;
  padding:2px 9px;border-radius:100px;letter-spacing:.06em;white-space:nowrap}
.pkg-diamond{font-size:1.3rem;margin-bottom:3px}
.pkg-amount{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:2px}
.pkg-amount span{color:var(--gold)}
.pkg-price{font-size:.76rem;color:var(--muted);font-weight:600}
.pkg-price strong{color:var(--white)}
.pkg-bonus{font-size:.67rem;color:#34d399;margin-top:3px;font-weight:800}
.sel-info{display:none;background:rgba(255,186,8,.07);border:1px solid rgba(255,186,8,.21);
  border-radius:11px;padding:12px 15px;margin-bottom:13px}
.sel-info .sil{font-size:.74rem;color:var(--muted);margin-bottom:4px}
.sel-info .sir{display:flex;justify-content:space-between;align-items:center}

.payment-layout{max-width:720px;margin:32px auto 0;padding:0 5% 52px}
.order-summary,.payment-methods,.payment-confirm{background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:24px;margin-bottom:16px;backdrop-filter:blur(14px)}
.order-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:.91rem}
.order-row:last-child{border-bottom:none;font-weight:800;font-size:1.03rem}
.order-row .lbl{color:var(--muted)}
.order-row .val{font-weight:700}
.order-row .val.gld{color:var(--gold)}
.pay-steps{background:rgba(46,125,237,.06);border:1px solid rgba(46,125,237,.18);
  border-radius:15px;padding:18px;margin:16px 0}
.ps-title{font-size:.76rem;font-weight:800;color:var(--blue-light);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:13px}
.ps-row{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
.ps-row:last-child{margin-bottom:0}
.ps-n{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;
  font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ps-t{font-size:.86rem;color:var(--muted);line-height:1.55}
.ps-t strong{color:var(--white)}
.wa-remind{background:linear-gradient(135deg,rgba(37,211,102,.11),rgba(11,29,58,.85));
  border:1px solid rgba(37,211,102,.26);border-radius:15px;padding:18px;text-align:center;margin:16px 0}
.wa-remind p{font-size:.87rem;color:var(--muted);margin-bottom:13px;line-height:1.6}
.wa-remind strong{color:#25d366}
.method-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:13px}
.method-card{border:2px solid var(--border);border-radius:13px;padding:12px 8px;
  text-align:center;cursor:pointer;transition:all .22s}
.method-card:hover{border-color:rgba(46,125,237,.38);transform:translateY(-2px)}
.method-card.selected{border-color:var(--blue);background:rgba(46,125,237,.07);
  box-shadow:0 0 14px rgba(46,125,237,.16)}
.method-logo{font-size:1.6rem;margin-bottom:5px}
.method-name{font-weight:800;font-size:.85rem}
.method-sub{color:var(--muted);font-size:.65rem;margin-top:2px}
.method-note{font-size:.8rem;color:var(--muted);margin-bottom:16px;line-height:1.6;
  background:rgba(46,125,237,.06);border:1px solid var(--border);border-radius:10px;padding:11px 14px}
.qr-area{text-align:center;margin:15px 0;padding:10px;background:rgba(255,255,255,.1);border-radius:12px}
.qr-area img{max-width:160px;border-radius:8px;background:#fff;padding:5px}
.phone-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.phone-pfx{background:rgba(11,29,58,.75);border:1.5px solid var(--border);border-radius:10px;
  padding:13px 13px;white-space:nowrap;font-weight:700;color:var(--muted)}
.success-box{display:none;text-align:center;padding:26px 0}
.success-box.show{display:block}
.suc-icon{font-size:3.4rem;margin-bottom:11px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(.5);opacity:0}80%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.success-box h3{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;
  margin-bottom:8px;color:var(--gold)}
.success-box p{color:var(--muted);font-size:.9rem;line-height:1.6}

.support-layout{max-width:820px;margin:32px auto 0;padding:0 5% 52px}
.tg-wa-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:26px}
.sc{border-radius:20px;padding:28px 22px;text-align:center;backdrop-filter:blur(12px)}
.sc.wa{background:linear-gradient(135deg,rgba(37,211,102,.13),rgba(11,29,58,.85));
  border:1px solid rgba(37,211,102,.25)}
.sc.tg{background:linear-gradient(135deg,rgba(0,136,204,.13),rgba(11,29,58,.85));
  border:1px solid rgba(0,136,204,.23)}
.sc .si{font-size:2.8rem;margin-bottom:11px}
.sc h3{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:7px}
.sc p{color:var(--muted);font-size:.87rem;margin-bottom:16px}
.faq-list{display:flex;flex-direction:column;gap:9px}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;backdrop-filter:blur(8px)}
.faq-q{padding:16px 19px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;
